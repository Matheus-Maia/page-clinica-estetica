### PÁGINA DE SERVIÇO (modelo — Depilação a Laser)

- **H1:** *"Depilação a Laser: Pele lisa e livre para sempre"*
- **Subtítulo intro:** *Tecnologia avançada para todos os tipos de pele. Resultados duradouros com segurança e conforto.*
- **Como funciona:** *A luz do laser age na raiz do pelo, inibindo o crescimento de forma progressiva e definitiva. Em poucas sessões, sua pele ganha maciez e liberdade.*
- **Para quem é:** *Indicada para mulheres que buscam praticidade, conforto e um resultado definitivo. Atendemos todos os fototipos de pele.*
- **FAQ exemplo:**
  - *"Quantas sessões são necessárias?"* — Em média 6 a 10 sessões, dependendo da área e do biotipo.
  - *"Dói?"* — O procedimento é bem tolerado. Usamos equipamentos modernos com sistema de resfriamento.
- **CTA:** `Quero minha avaliação gratuita`

