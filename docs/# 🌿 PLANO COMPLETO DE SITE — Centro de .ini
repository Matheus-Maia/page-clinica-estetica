## PARTE 4 — DESIGN SYSTEM BÁSICO

### 4.1 Paleta de Cores

Baseado na identidade visual observada no perfil (tons terrosos, rosê, verde musgo, neutros elegantes):

| Papel | Nome | HEX | Uso |
|---|---|---|---|
| **Primária** | Verde Musgo | `#4A5C4E` | Botões principais, headers, elementos de destaque |
| **Secundária** | Rosê Nude | `#D9B8A8` | Backgrounds de seções, cards, acentos |
| **Acento** | Dourado Quente | `#C4A882` | Ícones, bordas, detalhes premium |
| **Neutro Claro** | Off-White Creme | `#FAF6F2` | Background principal do site |
| **Neutro Escuro** | Grafite Suave | `#2E2E2E` | Textos principais |
| **Texto Secundário** | Cinza Médio | `#7A7A7A` | Subtítulos, descrições |
| **Sucesso/CTA** | Verde Sage | `#6B8C6E` | Hover em botões, elementos de confirmação |

**Gradiente Assinatura M&D:**
`linear-gradient(135deg, #4A5C4E → #6B8C6E)` para banners e Hero

### 4.2 Tipografia

**Fonte de Títulos (Display):** `Playfair Display` — Serifada elegante, transmite sofisticação e confiança médica. Uso: H1, H2, nome de procedimentos.

**Fonte de Corpo:** `Inter` — Sans-serif limpa, altamente legível em telas mobile. Uso: parágrafos, botões, navegação.

**Fonte de Apoio (opcional):** `Cormorant Garamond` (Italic) — Para citações, depoimentos, taglines em destaque.

**Escala Tipográfica:**
```
H1 (Hero):        48–60px / Playfair Display Bold
H2 (Seções):      32–40px / Playfair Display SemiBold
H3 (Cards):       20–24px / Inter SemiBold
Body:             16–18px / Inter Regular
Caption/Labels:   13–14px / Inter Medium
CTA Buttons:      15–16px / Inter SemiBold, All Caps
```

### 4.3 Estilo Visual

**Conceito:** `Premium Wellness — Clínica Moderna com Acolhimento Feminino`

**Diretrizes visuais:**
- **Layout:** Espaçamento generoso (whitespace abundante), grid de 12 colunas, seções bem delimitadas
- **Bordas:** Cantos arredondados (border-radius: 8–16px) nos cards e botões
- **Fotografia:** Imagens reais da clínica, equipe e pacientes (antes/depois com consentimento). Tonalidade quente e natural. Evitar stock photos genéricas.
- **Ícones:** Linha fina (stroke icons), estilo minimalista, na cor Verde Musgo ou Dourado
- **Sombras:** Sutis (box-shadow leve), nunca pesadas — transmitir leveza
- **Animações:** Micro-interações suaves (fade-in ao scroll, hover em cards), sem exageros que pesem o mobile

**Estilo geral:** Moderno + Clean + Premium Feminino. Referências visuais: clínicas de dermatologia de alto padrão, spas médicos europeus, marcas como Clinique e Maison Margiela Beauty.

