## PARTE 2 — HIERARQUIA DE INFORMAÇÕES (UX/UI)

### Princípios de UX para este site

O site deve seguir o modelo **"Confiança → Desejo → Ação"**. A mulher que chega ao site precisa, nesta ordem: sentir que a clínica é séria e confiável, visualizar os resultados que pode ter, e encontrar um caminho fácil para agendar.

**Prioridade de elementos por página:**

**HOME**
1. Hero com proposta de valor forte + CTA de agendamento
2. Prova social (números: pacientes atendidas, anos de experiência, avaliações)
3. Grade de serviços principais (6 cards visuais)
4. Seção "Por que a M&D?" (diferenciais)
5. Depoimentos em vídeo/foto (carrossel)
6. Antes & Depois (galeria com filtro por procedimento)
7. Apresentação da Dra. Danielle + equipe
8. Bloco de unidades com mapa
9. CTA final + WhatsApp flutuante

**SERVIÇOS (páginas individuais)**
1. Nome + descrição do procedimento (linguagem acessível)
2. "Como funciona" (passo a passo visual)
3. Para quem é indicado
4. Resultados esperados + tempo de tratamento
5. Galeria antes/depois específica
6. Depoimentos de quem fez
7. Perguntas frequentes (FAQ expansível)
8. CTA de agendamento / avaliação gratuita

**RESULTADOS**
1. Galeria filtrada por procedimento
2. Depoimentos em vídeo (incorporados do Instagram/YouTube)
3. CTA contextual

**SOBRE**
1. História da clínica e missão
2. Dra. Danielle — credenciais, especialidades, filosofia
3. Equipe com fotos profissionais
4. Valores e compromissos

**CONTATO / AGENDAMENTO**
1. Formulário de contato simples (nome, telefone, serviço de interesse)
2. WhatsApp direto
3. Endereços com Google Maps integrado
4. Horários de funcionamento

