## PARTE 3 — JORNADA DO USUÁRIO

### Persona Principal
**"A Ana"** — Mulher entre 28–50 anos, classe B/C, mora em SJC ou Taubaté, tem interesse em autoestima e cuidados corporais/faciais. Segue a clínica no Instagram. Busca resultados reais, segurança médica e custo-benefício.

### Mapa da Jornada

```
[DESCOBERTA]
Instagram / Indicação / Google →
Acessa o perfil ou site pela primeira vez

        ↓

[CONSCIÊNCIA]
Lê a bio, vê posts de resultados →
"Essa clínica parece séria e tem resultados reais"

        ↓

[CONSIDERAÇÃO]
Entra no site →
Lê sobre o procedimento de interesse →
Vê antes/depois e depoimentos →
"Eu consigo imaginar esse resultado em mim"

        ↓

[INTENÇÃO]
Clica em "Agendar Avaliação" ou acessa o WhatsApp →
Preenche formulário rápido

        ↓

[AÇÃO]
Agendamento confirmado →
E-mail/WhatsApp de confirmação com informações da consulta

        ↓

[PÓS-VENDA]
E-mail com dicas de pré e pós-tratamento →
Convite para seguir nas redes sociais →
Solicitação de avaliação/depoimento
```

### Pontos de Fricção a Eliminar
- Não exigir cadastro para agendar
- Botão de WhatsApp sempre visível (fixo no canto)
- Formulário com no máximo 3–4 campos
- Página de serviços com linguagem simples, sem excesso de termos técnicos
- Site responsivo e rápido no mobile (80% do tráfego virá do celular)

